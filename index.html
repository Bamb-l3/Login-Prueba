<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal MĂ©dico - Login y Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Transiciones suaves para mostrar/ocultar paneles */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

    <div id="toast" class="fixed top-5 right-5 bg-green-500 text-white px-6 py-3 rounded shadow-lg hidden transition-opacity z-50">
        Cambios guardados exitosamente.
    </div>

    <div id="login-view" class="min-h-screen flex items-center justify-center p-4 fade-in">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="p-8">
                <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">Acceso al Portal</h2>
                
                <div class="flex rounded-md bg-gray-200 p-1 mb-6">
                    <button id="btn-tab-patient" class="flex-1 py-2 rounded-md bg-white shadow text-sm font-medium transition-all" onclick="setRole('patient')">Paciente</button>
                    <button id="btn-tab-clinic" class="flex-1 py-2 rounded-md text-gray-600 text-sm font-medium transition-all hover:text-gray-800" onclick="setRole('clinic')">ClĂ­nica</button>
                </div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Correo ElectrĂ³nico</label>
                        <input type="email" id="loginEmail" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="correo@ejemplo.com">
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-1">ContraseĂ±a</label>
                        <input type="password" id="loginPassword" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢">
                    </div>
                    <p id="loginError" class="text-red-500 text-sm mb-4 hidden"></p>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition-colors duration-300">
                        Iniciar SesiĂ³n
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="patient-view" class="hidden min-h-screen p-4 md:p-8 fade-in">
        <div class="max-w-3xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">Mi Perfil - Paciente</h1>
                <button onclick="logout()" class="text-red-500 hover:text-red-700 font-medium">Cerrar SesiĂ³n</button>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 md:p-8">
                <form id="patientForm" onsubmit="saveProfile(event, 'patient')">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo *</label>
                            <input type="text" id="patName" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">TelĂ©fono *</label>
                            <input type="tel" id="patPhone" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none" required pattern="[0-9]{8,15}" title="Solo nĂºmeros (8-15 dĂ­gitos)">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Nacimiento</label>
                            <input type="date" id="patDate" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de Sangre</label>
                            <select id="patBlood" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="">Seleccionar...</option>
                                <option value="A+">A+</option><option value="O+">O+</option><option value="B+">B+</option><option value="AB+">AB+</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Alergias / Notas MĂ©dicas</label>
                            <textarea id="patNotes" rows="3" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                        </div>
                    </div>
                    <p id="patientError" class="text-red-500 text-sm mt-4 hidden"></p>
                    <div class="mt-6 flex justify-end">
                        <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-md transition-colors duration-300">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="clinic-view" class="hidden min-h-screen p-4 md:p-8 fade-in">
        <div class="max-w-3xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">Perfil Institucional - ClĂ­nica</h1>
                <button onclick="logout()" class="text-red-500 hover:text-red-700 font-medium">Cerrar SesiĂ³n</button>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 md:p-8">
                <form id="clinicForm" onsubmit="saveProfile(event, 'clinic')">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre de la ClĂ­nica *</label>
                            <input type="text" id="cliName" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email de Contacto *</label>
                            <input type="email" id="cliEmail" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">TelĂ©fono Principal *</label>
                            <input type="tel" id="cliPhone" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none" required>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">DirecciĂ³n Completa *</label>
                            <input type="text" id="cliAddress" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none" required minlength="10">
                        </div>
                    </div>
                    <p id="clinicError" class="text-red-500 text-sm mt-4 hidden"></p>
                    <div class="mt-6 flex justify-end">
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-md transition-colors duration-300">Actualizar Datos</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let currentRole = 'patient'; // 'patient' o 'clinic'

        // Cambiar estilos de las pestaĂ±as en el login
        function setRole(role) {
            currentRole = role;
            const btnPatient = document.getElementById('btn-tab-patient');
            const btnClinic = document.getElementById('btn-tab-clinic');

            if (role === 'patient') {
                btnPatient.className = "flex-1 py-2 rounded-md bg-white shadow text-sm font-medium transition-all text-gray-800";
                btnClinic.className = "flex-1 py-2 rounded-md text-gray-600 text-sm font-medium transition-all hover:text-gray-800 bg-transparent shadow-none";
            } else {
                btnClinic.className = "flex-1 py-2 rounded-md bg-white shadow text-sm font-medium transition-all text-gray-800";
                btnPatient.className = "flex-1 py-2 rounded-md text-gray-600 text-sm font-medium transition-all hover:text-gray-800 bg-transparent shadow-none";
            }
            
            // Limpiar errores al cambiar de pestaĂ±a
            document.getElementById('loginError').classList.add('hidden');
        }

        // ValidaciĂ³n de Login
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorMsg = document.getElementById('loginError');

            // Regex bĂ¡sico para validar email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!email || !password) {
                showError(errorMsg, "Por favor, completa todos los campos.");
                return;
            }
            if (!emailRegex.test(email)) {
                showError(errorMsg, "Ingresa un correo electrĂ³nico vĂ¡lido.");
                return;
            }
            if (password.length < 6) {
                showError(errorMsg, "La contraseĂ±a debe tener al menos 6 caracteres.");
                return;
            }

            // Si pasa las validaciones, simulamos el login ocultando/mostrando vistas
            document.getElementById('login-view').classList.add('hidden');
            
            if (currentRole === 'patient') {
                document.getElementById('patient-view').classList.remove('hidden');
            } else {
                document.getElementById('clinic-view').classList.remove('hidden');
            }
            
            // Limpiar formulario de login
            document.getElementById('loginForm').reset();
        }

        // FunciĂ³n auxiliar para mostrar errores
        function showError(element, message) {
            element.textContent = message;
            element.classList.remove('hidden');
            setTimeout(() => { element.classList.add('hidden'); }, 4000);
        }

        // ValidaciĂ³n y simulaciĂ³n de guardado de perfil
        function saveProfile(e, type) {
            e.preventDefault();
            
            // Las validaciones de campos vacĂ­os y formatos (email, tel) las maneja HTML5 con los atributos 'required', 'type="email"' y 'pattern'.
            // AquĂ­ podrĂ­amos agregar validaciones personalizadas extra.
            
            // Simular guardado exitoso
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            toast.style.opacity = 1;
            
            setTimeout(() => {
                toast.style.opacity = 0;
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 3000);
        }

        // Cerrar sesiĂ³n y volver al login
        function logout() {
            document.getElementById('patient-view').classList.add('hidden');
            document.getElementById('clinic-view').classList.add('hidden');
            document.getElementById('login-view').classList.remove('hidden');
            setRole('patient'); // Resetear al rol por defecto
        }
    </script>
</body>
</html>
